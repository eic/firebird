<mat-menu #viewOptions>
  <button mat-menu-item>
    <mat-checkbox
      [checked]="showAxisChecked"
      (click)="$event.stopPropagation()"
      (change)="setAxis($event)"
    >
      Show Axis
    </mat-checkbox>
  </button>

  <button mat-menu-item>
    <mat-checkbox
      (click)="$event.stopPropagation()"
      (change)="showLabels($event)"
    >
      Show Labels
    </mat-checkbox>
  </button>

  <button mat-menu-item>
    <mat-checkbox
      (click)="$event.stopPropagation()"
      (change)="setCartesianGrid($event)"
    >
      Show Cartesian Grid
    </mat-checkbox>
  </button>

  <button mat-menu-item>
    <mat-checkbox
      (click)="$event.stopPropagation()"
      (change)="setEtaPhiGrid($event)"
    >
      Show Eta/Phi Lines
    </mat-checkbox>
  </button>
</mat-menu>

<!-- The button that triggers the menu.  -->
<button mat-icon-button class="panel-button"
  matTooltip="Configure view options"
  [matMenuTriggerFor]="viewOptions"
>
  <mat-icon>visibility</mat-icon>
</button>
